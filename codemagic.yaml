# Codemagic CI/CD config for Blockfall Ascent (iOS build).
#
# Runs on the free Codemagic macOS M2 runners. Publishes an .ipa to
# TestFlight. Triggered manually to avoid burning free-tier minutes on
# every push.
#
# Setup required in Codemagic UI before first run:
#   1. Connect this GitHub repo to Codemagic.
#   2. Team Integrations -> App Store Connect: add an API key
#      (Users and Access -> Integrations -> App Store Connect API in
#      https://appstoreconnect.apple.com). Codemagic will auto-generate
#      the signing cert + provisioning profile from it.
#   3. Environment variables group `appstore_credentials` with:
#        APP_STORE_CONNECT_KEY_IDENTIFIER
#        APP_STORE_CONNECT_ISSUER_ID
#        APP_STORE_CONNECT_PRIVATE_KEY   (mark as Secure)
#   4. Register the app in App Store Connect with bundle id
#      com.blockfall.ascent BEFORE the first Codemagic build so TestFlight
#      upload has a target.

workflows:
  ios-release:
    name: iOS release build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.blockfall.ascent"
        APPLE_TEAM_ID: "99MZV2FQY9"
        SKIP_PATCH_PACKAGE: "1"
      node: 22
      xcode: latest
    triggering:
      # Manual trigger only. Change to `push` on the `main` branch once
      # you're comfortable spending build minutes on every commit.
      events: []
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - $HOME/Library/Developer/Xcode/DerivedData
        - $HOME/certs
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web bundle
        script: |
          npm run build
      - name: Capacitor sync (iOS)
        script: |
          npx cap sync ios
      - name: Set build number from Codemagic build index
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1)) || true
      - name: Set up code signing
        script: |
          keychain initialize
          # Generate a private key that fetch-signing-files will use both
          # to create a fresh iOS Distribution cert AND generate a matched
          # provisioning profile in one shot.
          mkdir -p ~/certs
          if [ ! -f ~/certs/cert_key.pem ]; then
            openssl genrsa -out ~/certs/cert_key.pem 2048
          fi
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:$HOME/certs/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - Stevensedwick6@gmail.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android release build (AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.blockfall.ascent"
      node: 22
      java: 21
    triggering:
      # Manual trigger only.
      events: []
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        # Persist the upload keystore across builds. If it's ever lost,
        # a new one is auto-generated on the next run and MUST be
        # downloaded from the build artifacts immediately.
        - $HOME/blockfall_keystore
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web bundle
        script: |
          npm run build
      - name: Capacitor sync (Android)
        script: |
          npx cap sync android
      - name: Provision upload keystore
        script: |
          set -e
          KEY_DIR="$HOME/blockfall_keystore"
          mkdir -p "$KEY_DIR"
          # Health check: if either file is missing OR the properties file
          # can't unlock the keystore, wipe and regenerate. Guards against
          # partial cache state from earlier failed builds.
          NEEDS_GEN=0
          if [ ! -f "$KEY_DIR/blockfall.keystore" ] || [ ! -f "$KEY_DIR/keystore.properties" ]; then
            NEEDS_GEN=1
          else
            PASS=$(grep '^storePassword=' "$KEY_DIR/keystore.properties" | cut -d= -f2-)
            if ! keytool -list -keystore "$KEY_DIR/blockfall.keystore" -storepass "$PASS" -alias blockfall > /dev/null 2>&1; then
              echo "Cached keystore failed self-check. Regenerating."
              NEEDS_GEN=1
            fi
          fi
          if [ "$NEEDS_GEN" = "1" ]; then
            rm -f "$KEY_DIR/blockfall.keystore" "$KEY_DIR/keystore.properties"
            echo "Generating fresh upload keystore."
            echo "!!! DOWNLOAD THE ARTIFACT keystore-bundle.zip AND STORE IT SAFELY !!!"
            # One password used for both store and key. Google's own docs
            # recommend this for upload keystores; it also avoids a whole
            # class of "Given final block not properly padded" bugs.
            PASS=$(openssl rand -hex 24)
            keytool -genkeypair \
              -v \
              -keystore "$KEY_DIR/blockfall.keystore" \
              -alias blockfall \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$PASS" \
              -keypass "$PASS" \
              -dname "CN=Steven Sedwick, OU=Blockfall, O=Blockfall, L=Unknown, S=Unknown, C=US"
            printf 'storeFile=blockfall.keystore\nstorePassword=%s\nkeyAlias=blockfall\nkeyPassword=%s\n' \
              "$PASS" "$PASS" > "$KEY_DIR/keystore.properties"
          else
            echo "Reusing cached keystore (self-check passed)."
          fi
          (cd "$KEY_DIR" && zip -r "$CM_BUILD_DIR/keystore-bundle.zip" blockfall.keystore keystore.properties)
          # Wire up for Gradle: build.gradle reads from workspace-root keystore.properties.
          cp "$KEY_DIR/blockfall.keystore" "$CM_BUILD_DIR/blockfall.keystore"
          cp "$KEY_DIR/keystore.properties" "$CM_BUILD_DIR/keystore.properties"
      - name: Set version code from build number
        script: |
          cd android
          sed -i.bak "s/versionCode 1/versionCode $(($PROJECT_BUILD_NUMBER + 1))/" app/build.gradle
          rm -f app/build.gradle.bak
      - name: Build signed AAB
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon
      - name: Build signed APK (for on-device testing)
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
      - keystore-bundle.zip
    publishing:
      email:
        recipients:
          - Stevensedwick6@gmail.com
        notify:
          success: true
          failure: true
